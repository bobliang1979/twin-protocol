services:
  solo:
    build:
      context: demo/node-side
      dockerfile: Dockerfile.solo
    ports:
      - "3737:3737"
    volumes:
      - ./codex_outbox.jsonl:/app/codex_outbox.jsonl
      - ./shared_cognition.jsonl:/app/shared_cognition.jsonl

  node-http:
    build:
      context: demo/node-side
      dockerfile: Dockerfile.node
    ports:
      - "3738:3738"
    volumes:
      - ./codex_outbox.jsonl:/app/codex_outbox.jsonl
      - ./shared_cognition.jsonl:/app/shared_cognition.jsonl
      - .:/workspace
