interface:
  display_name: "Chrome Dev 技术技能"
  short_description: "Chrome DevTools 自动化与浏览器控制"
  brand_color: "#4285F4"
  default_prompt: "使用 $chrome-dev 来分析页面性能、捕获网络请求、或通过 Chrome DevTools Protocol 控制浏览器"

dependencies:
  tools:
    - type: "mcp"
      value: "chrome"
      description: "Chrome 浏览器控制 MCP 服务"
      transport: "streamable_http"

policy:
  allow_implicit_invocation: true
