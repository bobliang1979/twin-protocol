version: "3.9"

# Twins Protocol — One-Click Demo
# Run: docker compose up
# Open: http://localhost:3737

services:
  # ── Solo Demo (simulated two-agent conversation) ──
  solo:
    build:
      context: ./demo/node-side
      dockerfile: Dockerfile.solo
    ports:
      - "3737:3737"
    volumes:
      - data:/app/data
      - ./demo/node-side:/app
    environment:
      - NODE_ENV=production
    command: node /app/twins-solo.js

  # ── HTTP Transport Server (real Node.js agent) ──
  agent-node:
    build:
      context: ./demo/node-side
      dockerfile: Dockerfile.node
    ports:
      - "3738:3738"
    volumes:
      - data:/app/data
      - ./demo/node-side:/app
    environment:
      - NODE_ENV=production
      - AGENT_NAME=codex
    command: node /app/twins-http-server.js 3738

  # ── Web Dashboard ──
  dashboard:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./demo/web-app:/usr/share/nginx/html:ro
    depends_on:
      - solo
      - agent-node

volumes:
  data:
