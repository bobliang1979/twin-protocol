<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twins Protocol — 双生协议演示</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
    background: #0d1117; color: #e6edf3; min-height: 100vh;
  }
  /* Header */
  .header {
    border-bottom: 1px solid #30363d; padding: 16px 24px;
    display: flex; align-items: center; gap: 16px;
  }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header .badge {
    background: #238636; color: #fff; padding: 2px 10px;
    border-radius: 12px; font-size: 12px;
  }
  .status-bar {
    display: flex; gap: 24px; padding: 8px 24px;
    background: #161b22; font-size: 12px; color: #8b949e;
  }
  .status-bar .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .dot.alive { background: #3fb950; }
  .dot.dead { background: #f85149; }
  
  /* Main Layout */
  .container { display: flex; gap: 0; height: calc(100vh - 80px); }
  .col {
    flex: 1; display: flex; flex-direction: column;
    border-right: 1px solid #30363d; overflow: hidden;
  }
  .col:last-child { border-right: none; }
  .col-header {
    padding: 12px 16px; font-weight: 600; font-size: 14px;
    border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 8px;
  }
  .col-hermes .col-header { background: #1c2333; }
  .col-codex .col-header { background: #1c2a1c; }
  .col-hermes .col-header::before { content: "🤖"; }
  .col-codex .col-header::before { content: "🧠"; }
  
  /* Message Log */
  .log {
    flex: 1; overflow-y: auto; padding: 12px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .entry {
    padding: 8px 12px; border-radius: 8px; font-size: 13px;
    line-height: 1.5; border: 1px solid transparent;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .entry.message { background: #161b22; border-color: #30363d; }
  .entry.tool_request { background: #1a2332; border-color: #1f6feb; }
  .entry.tool_result { background: #1a2e1a; border-color: #238636; }
  .entry.state_update { background: #2a1a2e; border-color: #8957e5; }
  .entry .meta { font-size: 11px; color: #8b949e; margin-bottom: 4px; }
  .entry .meta .tag {
    display: inline-block; padding: 0 6px; border-radius: 4px;
    font-size: 10px; font-weight: 600; margin-right: 6px;
  }
  .tag.tool_request { background: #1f6feb33; color: #58a6ff; }
  .tag.tool_result { background: #23863633; color: #3fb950; }
  .tag.message { background: #30363d; color: #e6edf3; }
  .tag.state_update { background: #8957e533; color: #a371f7; }
  .entry .body { white-space: pre-wrap; word-break: break-all; }
  .entry .body .label { color: #8b949e; }

  /* Shared Cognition Panel */
  .cognition-panel {
    position: fixed; bottom: 16px; right: 16px;
    background: #161b22; border: 1px solid #30363d;
    border-radius: 12px; padding: 16px; width: 360px;
    font-size: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    display: none; max-height: 300px; overflow-y: auto;
  }
  .cognition-panel.show { display: block; }
  .cognition-toggle {
    position: fixed; bottom: 16px; right: 16px;
    background: #238636; color: #fff; border: none;
    border-radius: 8px; padding: 8px 16px; cursor: pointer;
    font-size: 12px; z-index: 10;
  }
  .cognition-toggle:hover { background: #2ea043; }
</style>
</head>
<body>

<div class="header">
  <h1>⚡ Twins Protocol</h1>
  <span class="badge">v0.1</span>
  <span style="font-size:12px;color:#8b949e;margin-left:auto;">双生协议 — Agent-to-Agent 演示</span>
</div>

<div class="status-bar">
  <span><span class="dot alive"></span> Hermes Agent (Python)</span>
  <span><span class="dot alive"></span> Codex++ Agent (Node.js)</span>
  <span id="msgCount">消息: 0</span>
  <span id="lastUpdate">等待数据...</span>
</div>

<div class="container">
  <div class="col col-hermes">
    <div class="col-header">Hermes Agent</div>
    <div class="log" id="hermesLog">
      <div class="entry message"><div class="meta">等待连接...</div></div>
    </div>
  </div>
  <div class="col col-codex">
    <div class="col-header">Codex++ Agent</div>
    <div class="log" id="codexLog">
      <div class="entry message"><div class="meta">等待连接...</div></div>
    </div>
  </div>
</div>

<button class="cognition-toggle" onclick="document.querySelector('.cognition-panel').classList.toggle('show')">🧠 认知层</button>
<div class="cognition-panel" id="cognitionPanel">加载中...</div>

<script>
const OUTBOX_PATH = "/api/outbox";
const COGNITION_PATH = "/api/cognition";
let lastLineCount = 0;

async function fetchLines(url) {
  try {
    const res = await fetch(url);
    const text = await res.text();
    return text.trim().split("\n").filter(Boolean).map(line => {
      try { return JSON.parse(line); } catch { return null; }
    }).filter(Boolean);
  } catch { return []; }
}

async function updateLogs() {
  const lines = await fetchLines(OUTBOX_PATH);
  const hermesLog = document.getElementById("hermesLog");
  const codexLog = document.getElementById("codexLog");
  
  if (lines.length === lastLineCount && lines.length > 0) return;
  lastLineCount = lines.length;
  
  document.getElementById("msgCount").textContent = `消息: ${lines.length}`;
  document.getElementById("lastUpdate").textContent = `更新: ${new Date().toLocaleTimeString()}`;
  
  hermesLog.innerHTML = "";
  codexLog.innerHTML = "";
  
  for (const line of lines) {
    const el = document.createElement("div");
    el.className = `entry ${line.type || "message"}`;
    
    const source = line.source || "unknown";
    const targetLog = source === "codex" ? "hermesLog" : "codexLog";
    const targetEl = source === "codex" ? hermesLog : codexLog;
    
    let body = "";
    const tag = line.type || "message";
    
    switch (line.type) {
      case "message":
        body = `<span class="label">→ ${line.target || "*"}:</span> ${line.payload?.text || "(empty)"}`;
        break;
      case "tool_request":
        body = `<span class="label">🔧 ${line.tool}</span>\nparams: ${JSON.stringify(line.params, null, 1)}`;
        break;
      case "tool_result":
        body = `<span class="label">✅ ${line.tool}</span>`;
        if (line.result) body += `\n${JSON.stringify(line.result).slice(0, 200)}`;
        if (line.error) body += `\n❌ ${line.error}`;
        if (line.execution_ms) body += `\n⏱ ${line.execution_ms}ms`;
        break;
      case "state_update":
        body = `<span class="label">📋 ${line.state?.phase || "update"}</span>`;
        break;
      default:
        body = JSON.stringify(line).slice(0, 200);
    }
    
    el.innerHTML = `<div class="meta"><span class="tag ${tag}">${tag}</span>${line.request_id?.slice(0,8) || ""} ${line.timestamp?.slice(11,19) || ""}</div><div class="body">${body}</div>`;
    targetEl.appendChild(el);
  }
  
  // Scroll to bottom
  hermesLog.scrollTop = hermesLog.scrollHeight;
  codexLog.scrollTop = codexLog.scrollHeight;
}

async function updateCognition() {
  try {
    const res = await fetch(COGNITION_PATH);
    const text = await res.text();
    const data = JSON.parse(text);
    document.getElementById("cognitionPanel").innerHTML =
      `<div style="margin-bottom:8px"><b>🎯 ${data.goal || "(无目标)"}</b></div>` +
      `<div style="margin-bottom:4px">阶段: ${data.phase || "?"}</div>` +
      `<div style="margin-bottom:4px">已共识: ${(data.agreed_items || []).length} 项</div>` +
      `<div style="margin-bottom:4px">待办: ${(data.pending_items || []).length} 项</div>` +
      `<div style="margin-bottom:4px">活动任务: ${(data.active_tasks || []).length}</div>` +
      `<details><summary>查看任务板</summary><pre style="font-size:11px;margin-top:8px;overflow-x:auto">${JSON.stringify(data.active_tasks, null, 2)}</pre></details>`;
  } catch { /* ignore */ }
}

// Poll every 2 seconds
setInterval(updateLogs, 2000);
setInterval(updateCognition, 5000);
updateLogs();
updateCognition();
</script>
  <script src="twins-dashboard-enhancer.js"></script>
</body>
</html>
